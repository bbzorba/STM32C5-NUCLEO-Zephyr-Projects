# NUCLEO-C562RE OpenOCD target configuration
# STM32C562RE — Cortex-M33 r0p4, 512 KB Flash, 128 KB SRAM, TrustZone
#
# Based on stm32x5x_common.cfg / stm32u5x.cfg but with correct DBGMCU
# addresses for the STM32C5 family (0x44024xxx, NOT 0xE0044xxx).
#
# Usage (command-line):
#   openocd -c "set CPUTAPID 0x6ba02477" \
#           -f interface/stlink.cfg          \
#           -c "transport select dapdirect_swd" \
#           -f stm32c562re.cfg
#
# Usage (cortex-debug):
#   configFiles: ["interface/stlink.cfg", "${workspaceFolder}/stm32c562re.cfg"]
#   openOCDPreConfigLaunchCommands: ["set CPUTAPID 0x6ba02477"]
#   openOCDLaunchCommands: ["transport select dapdirect_swd"]

# ── Chip name ──────────────────────────────────────────────
if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME stm32c5x
}

# ── Work area (RAM used by flash loader) ───────────────────
if { [info exists WORKAREASIZE] } {
    set _WORKAREASIZE $WORKAREASIZE
} else {
    set _WORKAREASIZE 0x10000
}

# ── SWD IDCODE ─────────────────────────────────────────────
if { [info exists CPUTAPID] } {
    set _CPUTAPID $CPUTAPID
} else {
    set _CPUTAPID 0x6ba02477
}

# ── DAP / Target ───────────────────────────────────────────
source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian little -dap $_CHIPNAME.dap

$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

# ── Flash banks (stm32l4x driver, sizes auto-probed) ──────
flash bank $_CHIPNAME.flash_ns      stm32l4x 0x08000000 0 0 0 $_TARGETNAME
flash bank $_CHIPNAME.flash_alias_s stm32l4x 0x0C000000 0 0 0 $_TARGETNAME
flash bank $_CHIPNAME.otp           stm32l4x 0x0BFA0000 0 0 0 $_TARGETNAME

# ── Adapter speed (MSI 4 MHz after reset → safe at 500 kHz) ───
adapter speed 500

# ── Reset configuration ────────────────────────────────────
reset_config srst_nogate

if {[using_hla]} {
    echo "Warn : HLA mode — Secure debug not supported (Non-Secure only)"
} else {
    cortex_m reset_config sysresetreq
}

# ── Events ─────────────────────────────────────────────────
# STM32C5 DBGMCU base = 0x44024000  (NOT 0xE0044000 like STM32U5)
$_TARGETNAME configure -event examine-end {
    # DBGMCU_CR |= DBG_STANDBY | DBG_STOP  → keep debug active in low-power
    catch { mmw 0x44024004 0x00000006 0 }
    # DBGMCU_APB1_FZ |= DBG_IWDG_STOP | DBG_WWDG_STOP
    catch { mmw 0x44024008 0x00001800 0 }
}

$_TARGETNAME configure -event reset-start {
    adapter speed 480
}

$_TARGETNAME configure -event gdb-attach {
    echo "GDB attached: halting target for debug"
    reset halt
    # Force all GDB breakpoints to hardware FPB comparators (Cortex-M33 has 8).
    # Required because gdb memory_map is disabled (flash probe fails in Non-Secure
    # mode) so GDB has no flash region info and would try software breakpoints.
    gdb breakpoint_override hard
}

# We flash via STM32CubeProgrammer, not via OpenOCD.
# Disable GDB memory map to skip the Secure-domain flash register probe
# which fails when the CPU boots in Non-Secure state (stm32l4x driver
# attempts to read flash device ID at a Secure-only address 0x40015800).
gdb memory_map disable
gdb flash_program disable

$_TARGETNAME configure -event halted {
    # In HLA mode we cannot change AP CSW, so just report state
    if {![using_hla]} {
        # Check DSCSR.CDS (bit 16) for Secure/Non-Secure
        set DSCSR [mrw 0xE000EE08]
        if {($DSCSR & (1 << 16)) != 0} {
            echo "CPU in Secure state"
            # SPROT=0 = Secure access
            [[target current] cget -dap] apcsw 0x0B000000 0x4F000000
        } else {
            echo "CPU in Non-Secure state"
            # SPROT=1 = Non-Secure access
            [[target current] cget -dap] apcsw 0x4B000000 0x4F000000
        }
    }
}
